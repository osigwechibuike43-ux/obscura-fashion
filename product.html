
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Linen Shirt | AURA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">AURA</a></div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="cart.html">Cart (0)</a></li>
            </ul>
        </nav>
    </header>

    <main class="product-detail-container">
        <div class="product-image">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=800" alt="Linen Shirt">
        </div>
        <div class="product-info">
            <h2>Classic Linen Shirt</h2>
            <p class="price">$45.00</p>
            <p class="description">Breathable, lightweight, and perfectly tailored. This linen shirt is an essential building block for your everyday wardrobe.</p>
            
            <label for="size">Size:</label>
            <select id="size">
                <option>Small</option>
                <option>Medium</option>
                <option>Large</option>
                <option>X-Large</option>
            </select>
            
            <button class="btn add-to-cart-btn" onclick="addToCart()">Add to Cart</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 AURA Clothing. All rights reserved.</p>
    </footer>
    <script src="js/main.js"></script>
</body>
</html>
